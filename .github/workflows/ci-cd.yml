name: SmartServe AI CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Backend
      run: docker build -t backend ./backend

    - name: Build Frontend
      run: docker build -t frontend ./frontend
