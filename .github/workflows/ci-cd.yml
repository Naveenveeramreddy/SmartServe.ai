name: SmartServe AI CI/CD

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_BACKEND: smartserve-backend
  IMAGE_FRONTEND: smartserve-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 🔹 Setup Docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🔹 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Build Backend Image
    - name: Build Backend Image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
          ./backend

    # 🔹 Push Backend Image
    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

    # 🔹 Build Frontend Image (FIXED)
    - name: Build Frontend Image
      run: |
        docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
          ./frontend

    # 🔹 Push Frontend Image
    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
